name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      # Inject dummy variables to allow config.py settings validation to load in CI
      GEMINI_API_KEY: "AQ.dummy_gemini_key_long_enough_string_here"
      GMAIL_EMAIL: "dummy@gmail.com"
      GMAIL_APP_PASSWORD: "dummypasswordlong"
      TWILIO_ACCOUNT_SID: "ACdummyaccountsidvaluehere12345"
      TWILIO_AUTH_TOKEN: "dummyauthtokenvaluehere12345"
      TWILIO_FROM_NUMBER: "whatsapp:+14155238886"
      TWILIO_TO_NUMBER: "whatsapp:+917983109767"

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirement/requirements.txt
        pip install pytest black ruff

    - name: Code Formatting Check (Black)
      run: black --check .

    - name: Code Linting Check (Ruff)
      run: ruff check .

    - name: Run Test Suite (Pytest)
      run: python -m pytest
